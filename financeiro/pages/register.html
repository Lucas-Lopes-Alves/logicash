<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registro - LogiCash</title>
  <link rel="stylesheet" href="register.css">
</head>
<body class="bg-dark">
  <main class="centered-page">
    <div class="card auth-card">
      <div class="auth-brand">
        <h1>Criar conta - LogiCash</h1>
        <p class="muted">Crie sua conta</p>
      </div>

      <form id="registerForm" class="auth-form">
        <div id="registerMessage" class="message"></div>

        <label class="label">E-mail</label>
        <input type="email" id="emailRegister" required placeholder="seu@email.com">

        <label class="label">Senha</label>
        <input type="password" id="senhaRegister" required placeholder="Escolha uma senha">

        <button class="btn primary" type="submit">Registrar</button>

        <p class="small muted">Já tem conta? <a href="login.html" class="link">Entrar</a></p>
      </form>
    </div>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
