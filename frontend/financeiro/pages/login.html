<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - LogiCash</title>
  <link rel="stylesheet" href="login.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-dark">
  <main class="centered-page">
    <div class="card auth-card">
      <div class="auth-brand">
        <h1>LogiCash</h1>
        <p class="muted">Bem-vindo(a). Faça login para ter acesso!</p>
      </div>

      <form id="loginForm" class="auth-form">
        <div id="loginMessage" class="message"></div>

        <label class="label">E-mail</label>
        <input type="email" id="emailLogin" required placeholder="seu@email.com">

        <label class="label">Senha</label>
        <input type="password" id="senhaLogin" required placeholder="••••••••">

        <button class="btn primary" type="submit">Entrar</button>

        <p class="small muted">Não tem conta? <a href="register.html" class="link">Registre-se</a></p>
      </form>
    </div>
  </main>

</body>
</html>
